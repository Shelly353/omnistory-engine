<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novel Workflow Studio</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Novel Workflow Studio</h1>
      <p>Canon + 事件溯源 + 章节状态审校</p>
    </div>
    <div class="status-strip">
      <span id="connectionStatus">本地模式</span>
      <span id="projectStatus">未选择项目</span>
      <span id="auditStatus">Clean</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section>
        <h2>项目</h2>
        <form id="projectForm" class="stack">
          <input name="title" placeholder="小说名" required>
          <textarea name="concept" rows="5" placeholder="输入你的概念故事" required></textarea>
          <div class="grid-2">
            <input name="target_words" type="number" value="200000" min="50000" step="10000">
            <input name="style_profile" value="默认商业网文" placeholder="文风">
          </div>
          <button type="submit">创建项目</button>
        </form>
      </section>

      <section>
        <h2>项目列表</h2>
        <div id="projectList" class="list"></div>
      </section>

      <section>
        <h2>章节</h2>
        <div id="chapterList" class="list"></div>
      </section>
    </aside>

    <section class="workspace">
      <div class="actions">
        <button id="generateBible">生成故事圣经</button>
        <button id="approveBible">确认圣经 + Canon</button>
        <button id="generateBeats">生成六节点</button>
        <button id="generateEvents">扩展事件链</button>
        <button id="planChapters">生成前10章契约</button>
      </div>

      <section class="panel">
        <h2>故事圣经</h2>
        <textarea id="bibleEditor" rows="14" placeholder="生成或编辑故事圣经 JSON"></textarea>
      </section>

      <section class="panel">
        <h2>事件链</h2>
        <div id="eventList" class="event-list"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>章节正文</h2>
          <div>
            <button id="loadState">查看章前状态</button>
            <button id="generateDraft">生成正文</button>
            <button id="reviewDraft">审校正文</button>
            <button id="approveDraft">批准入稿</button>
          </div>
        </div>
        <textarea id="chapterEditor" rows="18" placeholder="选择章节后生成正文"></textarea>
      </section>
    </section>

    <aside class="inspector">
      <section>
        <h2>Canon 硬事实</h2>
        <div id="canonList" class="fact-list"></div>
      </section>

      <section>
        <h2>章前状态</h2>
        <pre id="stateView"></pre>
      </section>

      <section>
        <h2>审校</h2>
        <div id="auditList" class="fact-list"></div>
      </section>

      <section>
        <h2>新事实待确认</h2>
        <div id="proposedFacts" class="fact-list"></div>
      </section>
    </aside>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
