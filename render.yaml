services:
  - type: web
    name: novel-workflow-studio
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OMNISTORY_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://api.deepseek.com
      - key: AI_MODEL
        value: deepseek-v4-flash
      - key: AI_RATE_LIMIT_PER_MINUTE
        value: 20
